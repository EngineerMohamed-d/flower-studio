<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Studio</title>


<style>

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#fafafa;
    overflow-x:hidden;
}

/* ================= NAVBAR ================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.6);
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#ff4fc3;
    letter-spacing:1px;
}

.nav-links{
    display:flex;
    gap:40px;
    list-style:none;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    position:relative;
}

.nav-links a::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    background:#ff4fc3;
    bottom:-6px;
    left:0;
    transition:.4s;
}

.nav-links a:hover::after{
    width:100%;
}

.login-btn{
    padding:8px 22px;
    border-radius:50px;
    background:linear-gradient(45deg,#ff4fc3,#a64dff);
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:.3s;
}

.login-btn:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(255,79,195,.4);
}

/* ================= HERO ================= */

.hero{
    height:100vh;
    background:url("p1.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to right,rgba(255,255,255,0.8),rgba(255,255,255,0.6));
}

.hero-content{
    position:relative;
    z-index:2;
    animation:fadeUp 1.5s ease forwards;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:75px;
    color:#7a0066;
    margin-bottom:20px;
}

.hero p{
    font-size:18px;
    color:#444;
    margin-bottom:40px;
}

.hero button{
    padding:14px 40px;
    border:none;
    border-radius:50px;
    font-size:16px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff4fc3,#a64dff);
    color:white;
    transition:.4s;
}

.hero button:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 25px rgba(166,77,255,.4);
}

/* ================= ANIMATION ================= */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .nav-links{
        display:none;
    }

    .hero h1{
        font-size:45px;
    }

    .hero p{
        font-size:15px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="logo">Flower</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
    </ul>

    <a href="#" class="login-btn">Login</a>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Hello Flowers</h1>
        <p>Engineer Mohamed</p>
        <button>Explore More</button>
    </div>
</section>

</body>
</html>
